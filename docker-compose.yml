services:
  api:
    build:
      context: ./backend/Billing.Api
    ports:
      - "5012:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Cors__Origins__0: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5012
    ports:
      - "3000:80"
    depends_on:
      - api
